name: OS Service — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes e Qualidade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Testes unitários com cobertura
        run: npm run test:cov

      - name: Verificar cobertura mínima 80%
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const j=JSON.parse(d);
            console.log(j.total.lines.pct);
          ")
          echo "Cobertura: $COVERAGE%"
          node -e "if($COVERAGE < 80) { console.error('Cobertura abaixo de 80%'); process.exit(1); }"

      - name: Build
        run: npm run build

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/os-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/os-service:${{ github.sha }}

  deploy:
    name: Deploy Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar manifestos K8s
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          kubectl --kubeconfig=kubeconfig.yaml apply -f k8s/
          kubectl --kubeconfig=kubeconfig.yaml rollout status deployment/os-service -n oficina
